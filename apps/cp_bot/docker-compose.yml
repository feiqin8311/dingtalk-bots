services:
  dingtalk-cp-bot:
    build:
      context: ../..
      dockerfile: Dockerfile.cp
    image: dingtalk-cp-bot:latest
    container_name: dingtalk-cp-bot
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      TZ: Asia/Shanghai
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./downloads:/app/downloads
      - ./files:/app/files:ro
    command: ["python", "app.py"]
