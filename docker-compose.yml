services:
  dingtalk-bot:
    build:
      context: .
      dockerfile: Dockerfile.logistics
    image: dingtalk-bot:latest
    container_name: dingtalk-bot
    restart: unless-stopped
    env_file:
      - path: ./apps/logistics_bot/.env
        required: false
      - path: ./apps/cp_bot/.env
        required: false
      - path: ./apps/split_bot/.env
        required: false
    environment:
      COMMON_DIR: /opt/common
      TZ: Asia/Shanghai
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./apps/cp_bot/downloads:/app/apps/cp_bot/downloads
      - ./apps/cp_bot/files:/app/apps/cp_bot/files:ro
      - ./apps/split_bot/.bot-workspace:/app/apps/split_bot/.bot-workspace
      - ${COMMON_DIR:-/home/yida/Project/automation}:/opt/common:ro
    command: ["python", "apps/logistics_bot/main.py"]

  dingtalk-cp-bot:
    profiles: ["legacy"]
    build:
      context: .
      dockerfile: Dockerfile.cp
    image: dingtalk-cp-bot:latest
    container_name: dingtalk-cp-bot
    restart: unless-stopped
    env_file:
      - path: ./apps/cp_bot/.env
        required: false
    environment:
      COMMON_DIR: /opt/common
      TZ: Asia/Shanghai
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./apps/cp_bot/downloads:/app/downloads
      - ./apps/cp_bot/files:/app/files:ro
      - ${COMMON_DIR:-/home/yida/Project/automation}:/opt/common:ro
    command: ["python", "app.py"]

  dingtalk-split-bot:
    profiles: ["legacy"]
    build:
      context: .
      dockerfile: Dockerfile.split
    image: dingtalk-split-bot:latest
    container_name: dingtalk-split-bot
    restart: unless-stopped
    env_file:
      - path: ./apps/split_bot/.env
        required: false
    volumes:
      - ./apps/split_bot/.bot-workspace:/app/.bot-workspace
